<!DOCTYPE html>
<html lang="en" data-theme="cardcast">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardCast - Yu-Gi-Oh! Match Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .yg-card-aspect { aspect-ratio: 59/86; }
        .search-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; padding: 2rem; }
        .search-overlay.active { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-base-100 via-base-200 to-base-100">
    <div class="animated-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Header -->
    <div class="navbar glass-card border-b border-white/5 px-4 sm:px-6 fixed top-0 z-50 min-h-[3.75rem] gap-2">
        <div class="navbar-start gap-2 sm:gap-3">
            <a href="/" class="btn btn-ghost btn-sm gap-1.5 px-2" title="Back to Dashboard">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                <span class="hidden sm:inline">Dashboard</span>
            </a>
            <div class="h-6 w-px bg-white/10"></div>
            <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center shadow" style="background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>
                </div>
                <div class="leading-tight">
                    <div class="font-bold text-base">Yu-Gi-Oh! Match Control</div>
                    <div class="text-[10px] uppercase tracking-[0.18em] text-base-content/40 font-medium">CardCast</div>
                </div>
            </div>
        </div>
        <div class="navbar-end">
            <div class="badge badge-error gap-2 py-3 font-medium" id="overlayStatus">
                <div class="w-2 h-2 rounded-full bg-current"></div>
                <span>Overlay Not Connected</span>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-4 pt-20 pb-8">
        <div class="grid lg:grid-cols-2 gap-6" id="playersGrid"></div>

        <!-- Shared Match Controls -->
        <div class="card bg-base-100 shadow-xl mt-6">
            <div class="card-body">
                <div class="border-b border-base-300 pb-4">
                    <h3 class="text-sm uppercase tracking-wider text-primary font-semibold mb-3">Match Setup</h3>
                    <div class="flex flex-wrap items-center gap-4">
                        <div class="form-control">
                            <label class="label"><span class="label-text text-xs">Format</span></label>
                            <select id="matchFormat" class="select select-bordered select-sm">
                                <option value="Best of 1">Best of 1</option>
                                <option value="Best of 3" selected>Best of 3</option>
                            </select>
                        </div>
                        <div class="form-control">
                            <label class="label"><span class="label-text text-xs">Game</span></label>
                            <select id="gameNumber" class="select select-bordered select-sm">
                                <option value="1">Game 1</option>
                                <option value="2">Game 2</option>
                                <option value="3">Game 3</option>
                            </select>
                        </div>
                        <button class="btn btn-primary btn-sm mt-6" onclick="applyMatchSettings()">Apply Settings</button>
                    </div>
                </div>

                <div class="border-b border-base-300 py-4">
                    <h3 class="text-sm uppercase tracking-wider text-primary font-semibold mb-3">Phase</h3>
                    <div class="flex flex-wrap gap-2" id="phaseButtons"></div>
                </div>

                <div class="border-b border-base-300 py-4">
                    <h3 class="text-sm uppercase tracking-wider text-primary font-semibold mb-3">Timer Control</h3>
                    <div class="flex flex-wrap items-center gap-4">
                        <div class="text-5xl font-mono font-bold text-primary bg-base-200 px-6 py-3 rounded-lg" id="timerDisplay">40:00</div>
                        <div class="flex gap-2">
                            <button class="btn btn-success" onclick="startTimer()">Start</button>
                            <button class="btn btn-warning" onclick="pauseTimer()">Pause</button>
                            <button class="btn btn-neutral" onclick="resetTimer()">Reset</button>
                        </div>
                    </div>
                    <div class="flex flex-wrap items-end gap-3 mt-4">
                        <div class="form-control">
                            <label class="label py-0"><span class="label-text text-xs">Minutes</span></label>
                            <input type="number" id="timerMinutes" class="input input-bordered input-sm w-20" value="40" min="0" max="999">
                        </div>
                        <div class="form-control">
                            <label class="label py-0"><span class="label-text text-xs">Seconds</span></label>
                            <input type="number" id="timerSeconds" class="input input-bordered input-sm w-20" value="0" min="0" max="59">
                        </div>
                        <button class="btn btn-primary btn-sm" onclick="setTimer()">Set Timer</button>
                        <div class="flex gap-1">
                            <button class="btn btn-outline btn-sm" onclick="setTimerPreset(40)">40 min</button>
                            <button class="btn btn-outline btn-sm" onclick="setTimerPreset(50)">50 min</button>
                        </div>
                    </div>
                </div>

                <div class="border-b border-base-300 py-4">
                    <h3 class="text-sm uppercase tracking-wider text-primary font-semibold mb-3">Turn Control</h3>
                    <div class="flex flex-wrap items-center gap-4">
                        <div class="badge badge-lg badge-primary p-4" id="turnDisplay">Player 1's Turn</div>
                        <button class="btn btn-primary" onclick="switchTurn()">Switch Turn</button>
                        <span class="text-xs text-base-content/60 italic">Switching turns clears both players' Normal Summon flag</span>
                    </div>
                </div>

                <div class="border-b border-base-300 py-4">
                    <h3 class="text-sm uppercase tracking-wider text-primary font-semibold mb-3">Overlay Display</h3>
                    <div class="flex gap-2">
                        <button class="btn btn-success" onclick="showOverlay()">Show Overlay</button>
                        <button class="btn btn-warning" onclick="hideOverlay()">Hide Overlay</button>
                    </div>
                </div>

                <div class="pt-4">
                    <h3 class="text-sm uppercase tracking-wider text-primary font-semibold mb-3">Match Reset</h3>
                    <div class="flex items-center gap-4">
                        <button class="btn btn-error" onclick="resetMatch()">Reset Entire Match</button>
                        <span class="text-xs text-error opacity-70 italic">Clears zones, life, normal-summon, counts, phase and timer</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Search modal -->
    <div class="search-overlay" id="searchOverlay">
        <div class="card w-full max-w-5xl bg-base-100">
            <div class="card-body">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="card-title" id="searchTitle">Select Card</h2>
                    <button class="btn btn-circle btn-ghost btn-sm" onclick="closeSearch()" aria-label="Close">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    </button>
                </div>
                <div class="flex flex-wrap gap-2 mb-4 items-center">
                    <input type="text" id="cardSearch" placeholder="Search Yu-Gi-Oh! cards (name or passcode)..." class="input input-bordered flex-1 min-w-[12rem]">
                    <label class="label cursor-pointer gap-2 hidden" id="deckOnlyLabel">
                        <span class="label-text whitespace-nowrap">Deck only</span>
                        <input type="checkbox" id="searchDeckOnly" class="toggle toggle-secondary" onchange="runSearch()">
                    </label>
                    <label class="label cursor-pointer gap-2">
                        <span class="label-text whitespace-nowrap">All card types</span>
                        <input type="checkbox" id="searchAllTypes" class="toggle toggle-primary" onchange="runSearch()">
                    </label>
                </div>
                <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-8 gap-3 max-h-[600px] overflow-y-auto p-2" id="searchResults"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const PHASES = ['Draw', 'Standby', 'Main1', 'Battle', 'Main2', 'End'];

        function freshPlayer(name) {
            return {
                name, record: { wins: 0, losses: 0, ties: 0 }, gamesWon: 0,
                lifePoints: 8000, normalSummonUsed: false,
                monsters: [null, null, null, null, null],
                spellsTraps: [null, null, null, null, null],
                fieldSpell: null,
                counts: { hand: 0, deck: 0, extra: 0, graveyard: 0, banished: 0 }
            };
        }
        let state = {
            player1: freshPlayer('Player 1'),
            player2: freshPlayer('Player 2'),
            currentTurn: 1,
            currentPhase: 'Main1',
            timer: { minutes: 40, seconds: 0 },
            timerDuration: { minutes: 40, seconds: 0 },
            timerInterval: null,
            gameNumber: 1,
            matchFormat: 'Best of 3'
        };
        let searchContext = null; // { player, slot:'monster'|'spelltrap'|'field', index }
        let playerDecks = { 1: null, 2: null };
        let currentDeckCards = [];
        // Deck categories that make sense to quick-add into each board slot.
        const categoriesForSlot = { monster: ['Monsters', 'Extra'], spelltrap: ['Spells', 'Traps'], field: ['Spells'] };
        // Card-type substrings a normal search keeps for each slot (unless "All card types").
        const typeForSlot = { monster: ['monster'], spelltrap: ['spell', 'trap'], field: ['spell'] };

        function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); }
        function save() { localStorage.setItem('yugiohMatchState', JSON.stringify({ ...state, timerInterval: null })); }
        const num = (v, d = 0) => { const n = parseInt(v); return isNaN(n) ? d : n; };

        // ---------- Player board rendering ----------
        function renderPlayers() {
            document.getElementById('playersGrid').innerHTML = [1, 2].map(playerCardHtml).join('');
            [1, 2].forEach(n => { renderLife(n); renderNormalSummon(n); renderMonsters(n); renderSpellsTraps(n); renderField(n); renderCounts(n); });
            populateDeckSelectors();
            updateTurnDisplay();
        }

        // ---------- Deck-aware control ----------
        function yugiohDecks() {
            try { return (JSON.parse(localStorage.getItem('savedDecks') || '{}').yugioh) || []; }
            catch (e) { return []; }
        }
        function populateDeckSelectors() {
            const decks = yugiohDecks();
            [1, 2].forEach(n => {
                const sel = document.getElementById(`p${n}Deck`);
                if (!sel) return;
                const current = state[`player${n}`].deckName || '';
                sel.innerHTML = '<option value="">No deck (search all)</option>' +
                    decks.map(d => `<option value="${esc(d.name)}">${esc(d.name)}</option>`).join('');
                if (current && decks.find(d => d.name === current)) { sel.value = current; playerDecks[n] = decks.find(d => d.name === current); }
                else { sel.value = ''; playerDecks[n] = null; }
            });
        }
        function setPlayerDeck(n) {
            const name = document.getElementById(`p${n}Deck`).value;
            playerDecks[n] = name ? (yugiohDecks().find(d => d.name === name) || null) : null;
            state[`player${n}`].deckName = name || null;
            save();
        }
        function deckCardsForSlot(deck, slot) {
            const cats = (deck && deck.categories) || {};
            return (categoriesForSlot[slot] || []).flatMap(c => cats[c] || []);
        }
        // Re-resolve deck entries to full DB cards (image / ATK / DEF) for quick-add.
        async function resolveDeckCards(cards) {
            const unique = [...new Map(cards.map(c => [c.name, c])).values()];
            const resolved = await Promise.all(unique.map(async (c) => {
                try {
                    const arr = await (await fetch(`/api/search/yugioh?q=${encodeURIComponent(c.name)}`)).json();
                    const e = arr.find(x => (x.name || '').toLowerCase() === (c.name || '').toLowerCase());
                    return e || arr[0] || null;
                } catch (e) { return null; }
            }));
            return resolved.filter(Boolean);
        }
        async function populateDeckCards() {
            if (!searchContext) return;
            const deck = playerDecks[searchContext.player];
            const cards = deckCardsForSlot(deck, searchContext.slot);
            const out = document.getElementById('searchResults');
            if (!cards.length) { out.innerHTML = '<div class="col-span-full text-center text-base-content/50">No matching cards in this deck</div>'; return; }
            out.innerHTML = '<div class="col-span-full text-center"><span class="loading loading-spinner loading-md"></span> Loading deck cards...</div>';
            currentDeckCards = await resolveDeckCards(cards);
            displayResults(currentDeckCards);
        }

        function playerCardHtml(n) {
            const p = state[`player${n}`];
            const border = n === 1 ? 'border-primary' : 'border-error';
            return `
            <div class="card bg-base-100 shadow-xl border-t-4 ${border}">
                <div class="card-body gap-3">
                    <div class="flex items-center justify-between">
                        <input type="text" value="${esc(p.name)}" class="input input-ghost text-xl font-bold w-40" onchange="setName(${n}, this.value)">
                        <div class="flex items-center gap-1">
                            <span class="text-sm">Rec:</span>
                            <input type="number" id="p${n}W" value="${p.record.wins}" min="0" class="input input-bordered input-xs w-12" onchange="setRecord(${n})">
                            <span>/</span>
                            <input type="number" id="p${n}L" value="${p.record.losses}" min="0" class="input input-bordered input-xs w-12" onchange="setRecord(${n})">
                            <span>/</span>
                            <input type="number" id="p${n}T" value="${p.record.ties}" min="0" class="input input-bordered input-xs w-12" onchange="setRecord(${n})">
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-sm">Games Won:</span>
                        <div class="join">
                            <button class="btn btn-xs join-item" onclick="adjGamesWon(${n}, -1)">-</button>
                            <span class="join-item bg-base-200 px-3 py-1 text-sm" id="p${n}GamesWon">${p.gamesWon}</span>
                            <button class="btn btn-xs join-item" onclick="adjGamesWon(${n}, 1)">+</button>
                        </div>
                    </div>

                    <div class="flex items-center gap-2">
                        <span class="text-sm whitespace-nowrap">Deck:</span>
                        <select id="p${n}Deck" class="select select-bordered select-sm flex-1" onchange="setPlayerDeck(${n})">
                            <option value="">No deck (search all)</option>
                        </select>
                    </div>

                    <div class="divider my-0">Life Points</div>
                    <div class="flex items-center gap-2 flex-wrap">
                        <input type="number" id="p${n}LP" value="${p.lifePoints}" min="0" step="50" class="input input-bordered input-sm w-28 text-xl font-mono font-bold" onchange="setLife(${n}, this.value)">
                        <button class="btn btn-xs btn-outline" onclick="resetLife(${n})">8000</button>
                        <label class="label cursor-pointer gap-2 py-0 ml-auto">
                            <span class="label-text text-xs">Normal Summon used</span>
                            <input type="checkbox" id="p${n}NS" class="toggle toggle-warning toggle-sm" onchange="toggleNormalSummon(${n})">
                        </label>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        <button class="btn btn-xs btn-error btn-outline" onclick="adjLife(${n}, -100)">-100</button>
                        <button class="btn btn-xs btn-error btn-outline" onclick="adjLife(${n}, -500)">-500</button>
                        <button class="btn btn-xs btn-error btn-outline" onclick="adjLife(${n}, -1000)">-1000</button>
                        <button class="btn btn-xs btn-error btn-outline" onclick="adjLife(${n}, -2000)">-2000</button>
                        <button class="btn btn-xs btn-error btn-outline" onclick="adjLife(${n}, -4000)">-4000</button>
                        <button class="btn btn-xs btn-success btn-outline" onclick="adjLife(${n}, 500)">+500</button>
                        <button class="btn btn-xs btn-success btn-outline" onclick="adjLife(${n}, 1000)">+1000</button>
                    </div>

                    <div class="divider my-0">Monster Zones</div>
                    <div class="grid grid-cols-5 gap-1.5" id="p${n}Monsters"></div>

                    <div class="divider my-0">Spell / Trap</div>
                    <div class="grid grid-cols-5 gap-1.5" id="p${n}SpellsTraps"></div>

                    <div class="divider my-0">Field Spell</div>
                    <div id="p${n}Field"></div>

                    <div class="divider my-0">Zone Counts</div>
                    <div class="grid grid-cols-5 gap-2" id="p${n}Counts"></div>
                </div>
            </div>`;
        }

        function renderLife(n) {
            const el = document.getElementById(`p${n}LP`); if (el) el.value = state[`player${n}`].lifePoints;
        }
        function renderNormalSummon(n) {
            const el = document.getElementById(`p${n}NS`); if (el) el.checked = !!state[`player${n}`].normalSummonUsed;
        }

        function renderMonsters(n) {
            const p = state[`player${n}`];
            let html = '';
            for (let i = 0; i < 5; i++) {
                const m = p.monsters[i];
                if (!m) {
                    html += `
                    <div class="border-2 border-dashed border-base-content/20 rounded-lg p-1 flex items-center justify-center yg-card-aspect">
                        <button class="btn btn-primary btn-xs" onclick="openSearch(${n}, 'monster', ${i})">+ Mon</button>
                    </div>`;
                    continue;
                }
                const pos = m.position || 'atk';
                html += `
                <div class="bg-base-200 rounded-lg p-1">
                    <div class="relative">
                        <img src="${esc(m.image)}" class="w-full rounded yg-card-aspect object-cover" onerror="this.src=window.CARD_BACK">
                        <button class="btn btn-circle btn-xs btn-error absolute top-0.5 right-0.5" onclick="removeMonster(${n}, ${i})">x</button>
                    </div>
                    <div class="text-[10px] font-semibold truncate mt-0.5" title="${esc(m.name)}">${esc(m.name)}</div>
                    <div class="flex items-center gap-0.5 mt-0.5">
                        <span class="text-[9px] text-error">A</span>
                        <input type="number" value="${m.atk != null ? m.atk : 0}" class="input input-bordered input-xs w-full px-0.5 text-center" onchange="setMonsterAtk(${n}, ${i}, this.value)">
                        <span class="text-[9px] text-info">D</span>
                        <input type="number" value="${m.def != null ? m.def : 0}" class="input input-bordered input-xs w-full px-0.5 text-center" onchange="setMonsterDef(${n}, ${i}, this.value)">
                    </div>
                    <select class="select select-bordered select-xs w-full mt-0.5 px-1" onchange="setMonsterPosition(${n}, ${i}, this.value)">
                        <option value="atk" ${pos === 'atk' ? 'selected' : ''}>ATK</option>
                        <option value="def" ${pos === 'def' ? 'selected' : ''}>DEF</option>
                        <option value="set" ${pos === 'set' ? 'selected' : ''}>SET</option>
                    </select>
                </div>`;
            }
            document.getElementById(`p${n}Monsters`).innerHTML = html;
        }

        function renderSpellsTraps(n) {
            const p = state[`player${n}`];
            let html = '';
            for (let i = 0; i < 5; i++) {
                const c = p.spellsTraps[i];
                if (!c) {
                    html += `
                    <div class="border-2 border-dashed border-base-content/20 rounded-lg p-1 flex items-center justify-center yg-card-aspect">
                        <button class="btn btn-secondary btn-xs" onclick="openSearch(${n}, 'spelltrap', ${i})">+ S/T</button>
                    </div>`;
                    continue;
                }
                html += `
                <div class="bg-base-200 rounded-lg p-1">
                    <div class="relative">
                        <img src="${esc(c.image)}" class="w-full rounded yg-card-aspect object-cover" onerror="this.src=window.CARD_BACK">
                        <button class="btn btn-circle btn-xs btn-error absolute top-0.5 right-0.5" onclick="removeSpellTrap(${n}, ${i})">x</button>
                    </div>
                    <div class="text-[10px] font-semibold truncate mt-0.5" title="${esc(c.name)}">${esc(c.name)}</div>
                    <label class="label cursor-pointer gap-1 py-0 justify-start">
                        <input type="checkbox" ${c.faceDown ? 'checked' : ''} class="toggle toggle-xs" onchange="toggleSpellFaceDown(${n}, ${i})">
                        <span class="label-text text-[9px]">Set</span>
                    </label>
                </div>`;
            }
            document.getElementById(`p${n}SpellsTraps`).innerHTML = html;
        }

        function renderField(n) {
            const f = state[`player${n}`].fieldSpell;
            const el = document.getElementById(`p${n}Field`);
            if (!f) { el.innerHTML = `<button class="btn btn-secondary btn-sm" onclick="openSearch(${n}, 'field', 0)">+ Assign Field Spell</button>`; return; }
            el.innerHTML = `
            <div class="flex items-center gap-3 bg-base-200 rounded-lg p-2">
                <img src="${esc(f.image)}" class="w-12 rounded yg-card-aspect object-cover" onerror="this.src=window.CARD_BACK">
                <div class="flex-1 min-w-0"><div class="font-semibold text-sm truncate" title="${esc(f.name)}">${esc(f.name)}</div></div>
                <button class="btn btn-error btn-xs" onclick="removeField(${n})">Remove</button>
            </div>`;
        }

        function renderCounts(n) {
            const c = state[`player${n}`].counts || {};
            const items = [['Hand', 'hand'], ['Deck', 'deck'], ['Extra', 'extra'], ['GY', 'graveyard'], ['Ban', 'banished']];
            document.getElementById(`p${n}Counts`).innerHTML = items.map(([label, key]) => `
                <div class="flex flex-col items-center">
                    <span class="text-[9px] uppercase opacity-60">${label}</span>
                    <input type="number" value="${c[key] != null ? c[key] : 0}" min="0" class="input input-bordered input-xs w-full px-1 text-center" onchange="setCount(${n}, '${key}', this.value)">
                </div>`).join('');
        }

        // ---------- Mutations ----------
        function setName(n, v) {
            state[`player${n}`].name = v || `Player ${n}`;
            socket.emit('yugioh-match-update', { [`player${n}`]: { name: state[`player${n}`].name } });
            updateTurnDisplay(); save();
        }
        function setRecord(n) {
            const r = {
                wins: num(document.getElementById(`p${n}W`).value),
                losses: num(document.getElementById(`p${n}L`).value),
                ties: num(document.getElementById(`p${n}T`).value)
            };
            state[`player${n}`].record = r;
            socket.emit('yugioh-record-update', { player: n, record: r }); save();
        }
        function adjGamesWon(n, d) {
            const g = Math.max(0, (state[`player${n}`].gamesWon || 0) + d);
            state[`player${n}`].gamesWon = g;
            document.getElementById(`p${n}GamesWon`).textContent = g;
            socket.emit('yugioh-games-won-update', { player: n, gamesWon: g }); save();
        }
        function setLife(n, v) {
            const lp = Math.max(0, num(v, state[`player${n}`].lifePoints));
            state[`player${n}`].lifePoints = lp; renderLife(n);
            socket.emit('yugioh-life-update', { player: n, lifePoints: lp }); save();
        }
        function adjLife(n, d) {
            setLife(n, Math.max(0, (state[`player${n}`].lifePoints || 0) + d));
        }
        function resetLife(n) { setLife(n, 8000); }
        function toggleNormalSummon(n) {
            const used = document.getElementById(`p${n}NS`).checked;
            state[`player${n}`].normalSummonUsed = used;
            socket.emit('yugioh-normal-summon', { player: n, used }); save();
        }
        function setMonsterAtk(n, i, v) {
            const m = state[`player${n}`].monsters[i]; if (!m) return;
            m.atk = num(v); socket.emit('yugioh-monster-update', { player: n, index: i, monster: m }); save();
        }
        function setMonsterDef(n, i, v) {
            const m = state[`player${n}`].monsters[i]; if (!m) return;
            m.def = num(v); socket.emit('yugioh-monster-update', { player: n, index: i, monster: m }); save();
        }
        function setMonsterPosition(n, i, pos) {
            const m = state[`player${n}`].monsters[i]; if (!m) return;
            m.position = pos; renderMonsters(n);
            socket.emit('yugioh-monster-position', { player: n, index: i, position: pos }); save();
        }
        function removeMonster(n, i) {
            state[`player${n}`].monsters[i] = null; renderMonsters(n);
            socket.emit('yugioh-monster-update', { player: n, index: i, monster: null }); save();
        }
        function toggleSpellFaceDown(n, i) {
            const c = state[`player${n}`].spellsTraps[i]; if (!c) return;
            c.faceDown = !c.faceDown; renderSpellsTraps(n);
            socket.emit('yugioh-spelltrap-update', { player: n, index: i, card: c }); save();
        }
        function removeSpellTrap(n, i) {
            state[`player${n}`].spellsTraps[i] = null; renderSpellsTraps(n);
            socket.emit('yugioh-spelltrap-update', { player: n, index: i, card: null }); save();
        }
        function removeField(n) {
            state[`player${n}`].fieldSpell = null; renderField(n);
            socket.emit('yugioh-field-update', { player: n, field: null }); save();
        }
        function setCount(n, key, v) {
            const counts = state[`player${n}`].counts;
            counts[key] = Math.max(0, num(v));
            socket.emit('yugioh-counts-update', { player: n, counts }); save();
        }

        // ---------- Search + assignment ----------
        function openSearch(player, slot, index) {
            searchContext = { player, slot, index };
            currentDeckCards = [];
            const titles = { monster: 'Select Monster', spelltrap: 'Select Spell / Trap', field: 'Select Field Spell' };
            document.getElementById('searchTitle').textContent = titles[slot] || 'Select Card';
            document.getElementById('searchAllTypes').checked = false;
            document.getElementById('cardSearch').value = '';

            const deck = playerDecks[player];
            const hasDeckCat = !!(deck && deckCardsForSlot(deck, slot).length);
            document.getElementById('deckOnlyLabel').classList.toggle('hidden', !hasDeckCat);
            document.getElementById('searchDeckOnly').checked = hasDeckCat;

            document.getElementById('searchOverlay').classList.add('active');
            document.getElementById('cardSearch').focus();

            if (hasDeckCat) populateDeckCards();
            else document.getElementById('searchResults').innerHTML = '<div class="col-span-full text-center text-base-content/50">Search Yu-Gi-Oh! cards to assign...</div>';
        }
        function closeSearch() {
            document.getElementById('searchOverlay').classList.remove('active');
            searchContext = null;
        }
        function matchesSlotType(card, slot) {
            const t = (card.card_type || '').toLowerCase();
            return (typeForSlot[slot] || []).some(k => t.includes(k));
        }
        async function runSearch() {
            const q = document.getElementById('cardSearch').value.trim();
            const deckOnly = document.getElementById('searchDeckOnly').checked &&
                !document.getElementById('deckOnlyLabel').classList.contains('hidden');

            if (deckOnly) {
                if (!currentDeckCards.length) await populateDeckCards();
                const ql = q.toLowerCase();
                const list = q ? currentDeckCards.filter(c => (c.name || '').toLowerCase().includes(ql)) : currentDeckCards;
                displayResults(list);
                return;
            }

            if (q.length < 2) { document.getElementById('searchResults').innerHTML = '<div class="col-span-full text-center text-base-content/50">Type at least 2 characters...</div>'; return; }
            const all = document.getElementById('searchAllTypes').checked;
            try {
                const res = await fetch(`/api/search/yugioh?q=${encodeURIComponent(q)}`);
                let cards = await res.json();
                if (!all && searchContext) cards = cards.filter(c => matchesSlotType(c, searchContext.slot));
                displayResults(cards);
            } catch (e) { console.error('search error', e); }
        }
        function displayResults(cards) {
            const c = document.getElementById('searchResults');
            if (!cards.length) { c.innerHTML = '<div class="col-span-full text-center text-base-content/50">No cards found</div>'; return; }
            const seen = new Set();
            c.innerHTML = cards.filter(card => { if (seen.has(card.id)) return false; seen.add(card.id); return true; }).map(card => {
                const isMon = (card.card_type || '').toLowerCase().includes('monster');
                const meta = isMon
                    ? `ATK ${card.attack != null ? card.attack : '?'} / DEF ${card.defense != null ? card.defense : '?'}`
                    : esc(card.card_type || '');
                return `
                <div class="card bg-base-200 cursor-pointer hover:shadow-lg" onclick="pickCard('${card.id}')">
                    <figure class="px-2 pt-2"><img src="${esc(card.display_image || card.image_url || card.local_image)}" class="rounded-lg yg-card-aspect object-cover w-full" onerror="this.src=window.CARD_BACK"></figure>
                    <div class="card-body p-2">
                        <p class="text-xs font-semibold truncate">${esc(card.name)}</p>
                        <p class="text-[10px] opacity-70">${meta}</p>
                    </div>
                </div>`;
            }).join('');
        }
        async function pickCard(id) {
            if (!searchContext) return;
            try {
                const res = await fetch(`/api/card/yugioh/${id}`);
                const card = await res.json();
                const image = card.display_image || card.image_url || card.local_image;
                const { player, slot, index } = searchContext;
                if (slot === 'monster') {
                    const atk = parseInt(card.attack); const def = parseInt(card.defense);
                    const monster = { id: card.id, name: card.name, image, atk: isNaN(atk) ? 0 : atk, def: isNaN(def) ? 0 : def, position: 'atk' };
                    state[`player${player}`].monsters[index] = monster; renderMonsters(player);
                    socket.emit('yugioh-monster-update', { player, index, monster });
                } else if (slot === 'spelltrap') {
                    const c = { id: card.id, name: card.name, image, faceDown: false };
                    state[`player${player}`].spellsTraps[index] = c; renderSpellsTraps(player);
                    socket.emit('yugioh-spelltrap-update', { player, index, card: c });
                } else if (slot === 'field') {
                    const field = { id: card.id, name: card.name, image };
                    state[`player${player}`].fieldSpell = field; renderField(player);
                    socket.emit('yugioh-field-update', { player, field });
                }
                save(); closeSearch();
            } catch (e) { console.error('pick error', e); }
        }

        // ---------- Shared match controls ----------
        function applyMatchSettings() {
            state.gameNumber = parseInt(document.getElementById('gameNumber').value);
            state.matchFormat = document.getElementById('matchFormat').value;
            socket.emit('match-settings', { gameNumber: state.gameNumber, matchFormat: state.matchFormat }); save();
        }
        function renderPhaseButtons() {
            document.getElementById('phaseButtons').innerHTML = PHASES.map(ph =>
                `<button class="btn btn-sm ${ph === state.currentPhase ? 'btn-primary' : 'btn-outline'}" onclick="setPhase('${ph}')">${ph}</button>`).join('');
        }
        function setPhase(ph) {
            state.currentPhase = ph; renderPhaseButtons();
            socket.emit('yugioh-phase-update', { phase: ph }); save();
        }
        function switchTurn() {
            state.currentTurn = state.currentTurn === 1 ? 2 : 1;
            // New turn -> both Normal Summons reset.
            [1, 2].forEach(n => { state[`player${n}`].normalSummonUsed = false; renderNormalSummon(n); socket.emit('yugioh-normal-summon', { player: n, used: false }); });
            socket.emit('turn-switch', { currentTurn: state.currentTurn });
            updateTurnDisplay(); save();
        }
        function updateTurnDisplay() {
            document.getElementById('turnDisplay').textContent = `${state[`player${state.currentTurn}`].name}'s Turn`;
        }
        function startTimer() {
            if (state.timerInterval) return;
            socket.emit('timer-start');
            state.timerInterval = setInterval(() => {
                if (state.timer.seconds > 0) state.timer.seconds--;
                else if (state.timer.minutes > 0) { state.timer.minutes--; state.timer.seconds = 59; }
                else { pauseTimer(); }
                updateTimerDisplay();
            }, 1000);
        }
        function pauseTimer() {
            if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; socket.emit('timer-pause'); }
        }
        function resetTimer() {
            pauseTimer();
            const d = state.timerDuration || { minutes: 40, seconds: 0 };
            state.timer = { minutes: d.minutes, seconds: d.seconds };
            updateTimerDisplay(); socket.emit('timer-reset', d); save();
        }
        function setTimer() {
            let m = num(document.getElementById('timerMinutes').value); let s = num(document.getElementById('timerSeconds').value);
            if (m < 0) m = 0; if (s < 0) s = 0; if (s > 59) s = 59;
            pauseTimer();
            state.timerDuration = { minutes: m, seconds: s }; state.timer = { minutes: m, seconds: s };
            updateTimerDisplay(); socket.emit('timer-set', { minutes: m, seconds: s }); save();
        }
        function setTimerPreset(m) { document.getElementById('timerMinutes').value = m; document.getElementById('timerSeconds').value = 0; setTimer(); }
        function updateTimerDisplay() {
            document.getElementById('timerDisplay').textContent = `${String(state.timer.minutes).padStart(2, '0')}:${String(state.timer.seconds).padStart(2, '0')}`;
        }
        function showOverlay() { socket.emit('toggle-yugioh-match', { show: true }); pushFullState(); }
        function hideOverlay() { socket.emit('toggle-yugioh-match', { show: false }); }
        function resetMatch() {
            if (!confirm('Reset the entire Yu-Gi-Oh! match?')) return;
            const p1 = state.player1.name, p2 = state.player2.name;
            const dur = state.timerDuration || { minutes: 40, seconds: 0 };
            if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
            state = {
                player1: freshPlayer(p1), player2: freshPlayer(p2),
                currentTurn: 1, currentPhase: 'Main1', timer: { minutes: dur.minutes, seconds: dur.seconds },
                timerDuration: dur, timerInterval: null, gameNumber: 1, matchFormat: state.matchFormat
            };
            socket.emit('yugioh-match-reset');
            renderPlayers(); renderPhaseButtons(); updateTimerDisplay(); save();
        }

        // Push the whole board to a freshly-shown / reconnected overlay.
        function pushFullState() {
            socket.emit('yugioh-match-update', {
                player1: state.player1, player2: state.player2,
                currentTurn: state.currentTurn, currentPhase: state.currentPhase,
                gameNumber: state.gameNumber, matchFormat: state.matchFormat
            });
        }

        function updateOverlayStatus(connected) {
            const s = document.getElementById('overlayStatus');
            s.className = 'badge gap-2 py-3 font-medium ' + (connected ? 'badge-success' : 'badge-error');
            s.innerHTML = `<div class="w-2 h-2 rounded-full bg-current"></div><span>${connected ? 'Overlay Connected' : 'Overlay Not Connected'}</span>`;
        }

        function load() {
            const saved = localStorage.getItem('yugiohMatchState');
            if (saved) {
                try {
                    const s = JSON.parse(saved);
                    state = { ...state, ...s, timerInterval: null };
                    state.player1 = { ...freshPlayer('Player 1'), ...s.player1 };
                    state.player2 = { ...freshPlayer('Player 2'), ...s.player2 };
                } catch (e) { console.error('load error', e); }
            }
            document.getElementById('matchFormat').value = state.matchFormat;
            document.getElementById('gameNumber').value = state.gameNumber;
            const d = state.timerDuration || { minutes: 40, seconds: 0 };
            document.getElementById('timerMinutes').value = d.minutes;
            document.getElementById('timerSeconds').value = d.seconds;
        }

        document.addEventListener('DOMContentLoaded', () => {
            load();
            renderPlayers();
            renderPhaseButtons();
            updateTimerDisplay();
            document.getElementById('cardSearch').addEventListener('input', debounce(runSearch, 300));

            socket.emit('register-control', 'yugioh-match');
            socket.on('connect', () => { socket.emit('register-control', 'yugioh-match'); socket.emit('check-overlay-status', 'yugioh-match'); });
            socket.on('overlay-connected', (t) => { if (t === 'yugioh-match') { updateOverlayStatus(true); pushFullState(); } });
            socket.on('overlay-disconnected', (t) => { if (t === 'yugioh-match') updateOverlayStatus(false); });

            setTimeout(pushFullState, 600);
        });

        function debounce(fn, wait) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), wait); }; }

        // Self-contained card back fallback (matches the overlay's).
        window.CARD_BACK = 'data:image/svg+xml;utf8,' + encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 59 86">' +
            '<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">' +
            '<stop offset="0" stop-color="#7c5b2e"/><stop offset="1" stop-color="#3b2a14"/></linearGradient></defs>' +
            '<rect width="59" height="86" rx="5" fill="url(#g)"/>' +
            '<rect x="4" y="4" width="51" height="78" rx="4" fill="none" stroke="#caa45a" stroke-width="1.5"/>' +
            '<circle cx="29.5" cy="43" r="13" fill="none" stroke="#caa45a" stroke-width="1.5"/>' +
            '<text x="29.5" y="47.5" font-family="serif" font-size="12" fill="#caa45a" text-anchor="middle">YG</text></svg>');

        // expose for inline handlers
        Object.assign(window, {
            setName, setRecord, adjGamesWon, setLife, adjLife, resetLife, toggleNormalSummon, setPlayerDeck,
            openSearch, closeSearch, runSearch, pickCard,
            setMonsterAtk, setMonsterDef, setMonsterPosition, removeMonster,
            toggleSpellFaceDown, removeSpellTrap, removeField, setCount,
            applyMatchSettings, setPhase, switchTurn, startTimer, pauseTimer, resetTimer, setTimer, setTimerPreset,
            showOverlay, hideOverlay, resetMatch
        });
    </script>
</body>
</html>
