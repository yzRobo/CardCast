<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>CardCast - Prize Cards Overlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1920px;
            height: 1080px;
            background: transparent;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Stack of two player panels, anchored top-left; reposition in OBS */
        .prizes-wrap {
            position: absolute;
            top: 60px;
            left: 60px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .player-prize {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 14px 20px;
            background: linear-gradient(180deg, rgba(18, 24, 38, 0.96) 0%, rgba(11, 15, 23, 0.97) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-left: 4px solid var(--accent, #6366f1);
            border-radius: 14px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
            opacity: 0;
            transform: translateX(-40px);
            transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s ease;
        }
        .prizes-wrap.active .player-prize { opacity: 1; transform: translateX(0); }
        .prizes-wrap.active .player-prize:nth-child(2) { transition-delay: 0.08s; }

        .pp-info {
            min-width: 150px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .pp-name {
            color: #fff;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
        .pp-label {
            color: rgba(226, 232, 240, 0.45);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.18em;
        }

        .pp-cards { display: flex; gap: 8px; }

        .prize-card {
            width: 46px;
            height: 64px;
            border-radius: 6px;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s ease, filter 0.35s ease;
            position: relative;
        }
        .pcard-back {
            width: 100%; height: 100%;
            border-radius: 6px;
            background: linear-gradient(160deg, #28306b 0%, #161a3a 100%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 3px 8px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }
        /* Poke Ball emblem */
        .pcard-back::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 22px; height: 22px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background:
                radial-gradient(circle at 50% 50%, #fff 0 3.5px, #11142e 3.5px 5.5px, transparent 5.5px),
                linear-gradient(#e23b3b 0 calc(50% - 1.5px), #11142e calc(50% - 1.5px) calc(50% + 1.5px), #f3f4f6 calc(50% + 1.5px) 100%);
            border: 1.5px solid #11142e;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.18);
        }

        .prize-card.taken {
            transform: scale(0.86);
            opacity: 0.22;
            filter: grayscale(0.9);
        }
        .prize-card.taken::after {
            content: '\2713'; /* check */
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #34d399;
            font-size: 26px;
            font-weight: 800;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
        }

        .pp-count {
            min-width: 64px;
            text-align: center;
            margin-left: 6px;
        }
        .pp-count .num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 46px;
            font-weight: 800;
            line-height: 1;
            color: #fff;
            transition: color 0.3s ease;
        }
        .pp-count .cap {
            color: rgba(226, 232, 240, 0.4);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            margin-top: 4px;
        }

        /* Urgency states driven by JS via data-left */
        .player-prize[data-left="2"] { --accent: #fbbf24; }
        .player-prize[data-left="2"] .pp-count .num { color: #fbbf24; }
        .player-prize[data-left="1"] { --accent: #f87171; }
        .player-prize[data-left="1"] .pp-count .num { color: #f87171; animation: pulse 1s ease-in-out infinite; }
        .player-prize[data-left="0"] { --accent: #34d399; box-shadow: 0 0 0 1px rgba(52, 211, 153, 0.5), 0 18px 50px rgba(16, 185, 129, 0.35); }
        .player-prize[data-left="0"] .pp-count .num { color: #34d399; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.12); opacity: 0.85; }
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="prizes-wrap" id="prizesWrap">
        <div class="player-prize" id="p1Panel" style="--accent:#60a5fa">
            <div class="pp-info">
                <div class="pp-name" id="p1Name">Player 1</div>
                <div class="pp-label">Prizes Left</div>
            </div>
            <div class="pp-cards" id="p1Row"></div>
            <div class="pp-count"><div class="num" id="p1Count">6</div><div class="cap">Left</div></div>
        </div>

        <div class="player-prize" id="p2Panel" style="--accent:#f472b6">
            <div class="pp-info">
                <div class="pp-name" id="p2Name">Player 2</div>
                <div class="pp-label">Prizes Left</div>
            </div>
            <div class="pp-cards" id="p2Row"></div>
            <div class="pp-count"><div class="num" id="p2Count">6</div><div class="cap">Left</div></div>
        </div>
    </div>

    <script>
        const socket = io('http://localhost:3888');
        let currentGame = 'pokemon';
        let prizeData = {
            player1: { name: 'Player 1', total: 6, taken: [] },
            player2: { name: 'Player 2', total: 6, taken: [] }
        };

        function renderPlayer(n) {
            const p = prizeData['player' + n];
            const total = p.total || 6;
            const taken = Array.isArray(p.taken) ? p.taken : [];
            const left = Math.max(0, total - taken.length);

            const row = document.getElementById('p' + n + 'Row');
            row.innerHTML = '';
            for (let i = 0; i < total; i++) {
                const card = document.createElement('div');
                card.className = 'prize-card' + (taken.includes(i) ? ' taken' : '');
                card.innerHTML = '<div class="pcard-back"></div>';
                row.appendChild(card);
            }

            document.getElementById('p' + n + 'Name').textContent = p.name || ('Player ' + n);
            document.getElementById('p' + n + 'Count').textContent = left;
            document.getElementById('p' + n + 'Panel').setAttribute('data-left', left);
        }

        function renderAll() { renderPlayer(1); renderPlayer(2); }

        function setShown(show) {
            document.getElementById('prizesWrap').classList.toggle('active', !!show);
        }

        socket.on('prizes-update', (data) => {
            if (!data) return;
            if (data.game) currentGame = data.game;
            if (data.player1) prizeData.player1 = Object.assign({ name: 'Player 1', total: 6, taken: [] }, data.player1);
            if (data.player2) prizeData.player2 = Object.assign({ name: 'Player 2', total: 6, taken: [] }, data.player2);
            renderAll();
            if (data.show !== undefined) setShown(data.show);
        });

        socket.on('prize-taken', (data) => {
            const { player, index } = data || {};
            const p = prizeData['player' + player];
            if (p && !p.taken.includes(index)) { p.taken.push(index); renderPlayer(player); }
        });

        socket.on('prizes-reset', () => {
            prizeData.player1.taken = [];
            prizeData.player2.taken = [];
            renderAll();
        });

        socket.on('connect', () => {
            socket.emit('register-overlay', 'prizes');
            socket.emit('request-state', 'prizes');
        });

        renderAll();
    </script>
</body>
</html>
