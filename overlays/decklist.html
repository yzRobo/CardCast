<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>CardCast - Deck List Overlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1920px;
            height: 1080px;
            background: transparent;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Panel anchored top-left; reposition/crop in OBS as needed */
        .deck-panel {
            position: absolute;
            top: 60px;
            left: 60px;
            width: 460px;
            max-height: 960px;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, rgba(18, 24, 38, 0.96) 0%, rgba(11, 15, 23, 0.97) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            opacity: 0;
            transform: translateX(-40px);
            transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .deck-panel.active { opacity: 1; transform: translateX(0); }

        /* Accent bar on top */
        .deck-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #6366f1, #a855f7, #38bdf8);
        }

        .deck-header {
            padding: 22px 24px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .deck-title {
            color: #fff;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.15;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .deck-sub {
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(226, 232, 240, 0.55);
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        .deck-sub .dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; opacity: 0.5; }
        .deck-total-pill {
            margin-left: auto;
            background: rgba(99, 102, 241, 0.18);
            border: 1px solid rgba(129, 140, 248, 0.35);
            color: #c7d2fe;
            padding: 3px 10px;
            border-radius: 999px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            letter-spacing: 0;
        }

        .deck-body {
            padding: 16px 20px 8px;
            overflow: hidden;
            column-count: 1;
            column-gap: 22px;
        }
        /* If lots of cards, switch to two columns automatically */
        .deck-body.two-col { column-count: 2; }

        .category { break-inside: avoid; margin-bottom: 16px; }
        .category-head {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }
        .category-accent {
            width: 4px; height: 16px; border-radius: 2px;
            background: var(--accent, #6366f1);
        }
        .category-name {
            color: #e6ebf5;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .category-count {
            margin-left: auto;
            color: rgba(226, 232, 240, 0.45);
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
        }

        .card-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 3px 0;
        }
        .card-qty {
            flex-shrink: 0;
            min-width: 26px;
            text-align: center;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 13px;
            background: var(--accent, #6366f1);
            border-radius: 6px;
            padding: 1px 4px;
            opacity: 0.92;
        }
        .card-name {
            color: rgba(232, 237, 245, 0.92);
            font-size: 15px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .deck-empty {
            padding: 30px 24px;
            text-align: center;
            color: rgba(226, 232, 240, 0.4);
            font-size: 14px;
        }

        .deck-foot {
            margin-top: auto;
            padding: 10px 24px 14px;
            display: flex;
            align-items: center;
            gap: 7px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(226, 232, 240, 0.4);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }
        .deck-foot .brand-dot {
            width: 14px; height: 14px; border-radius: 4px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="deck-panel" id="deckPanel">
        <div class="deck-header">
            <div class="deck-title" id="deckTitle">Deck List</div>
            <div class="deck-sub">
                <span id="deckGame">Pokemon</span>
                <span class="dot"></span>
                <span id="deckCats">0 types</span>
                <span class="deck-total-pill" id="deckTotal">0</span>
            </div>
        </div>
        <div class="deck-body" id="deckBody"></div>
        <div class="deck-foot"><span class="brand-dot"></span> CardCast</div>
    </div>

    <script>
        const socket = io('http://localhost:3888');
        let currentDeck = { title: 'Deck List', game: '', categories: {} };

        // Display order + accent color per category
        const CATEGORY_ORDER = [
            'Pokemon', 'Trainers', 'Energy',
            'Units', 'Pilots', 'Commands', 'Bases', 'Resources',
            // One Piece: Leader headlines, then Characters, Events, Stages. 'Events'
            // sits before MTG's 'Spells' run; these keys are unique to One Piece so
            // no other game's section order shifts.
            'Leader', 'Characters', 'Events', 'Stages',
            // Lorcana: Characters (shared with One Piece) then Actions, Items,
            // Locations. These keys are unique to Lorcana so no other game shifts.
            'Actions', 'Items', 'Locations',
            // Yu-Gi-Oh keys are interleaved around 'Spells' so a YGO deck reads
            // Monsters, Spells, Traps, Extra, Side; MTG decks never contain these
            // keys, so MTG section order is unchanged.
            'Deck', 'Creatures', 'Monsters', 'Spells', 'Traps', 'Extra', 'Side',
            'Artifacts', 'Enchantments', 'Planeswalkers', 'Lands', 'Sideboard'
        ];
        const CATEGORY_ACCENT = {
            Pokemon: '#f87171', Trainers: '#fbbf24', Energy: '#34d399',
            Units: '#38bdf8', Pilots: '#fbbf24', Commands: '#f87171', Bases: '#34d399', Resources: '#94a3b8',
            // Leader gets a distinct gold accent so it reads as the headline.
            Leader: '#f59e0b', Characters: '#f87171', Events: '#38bdf8', Stages: '#34d399',
            // Lorcana ink-themed accents (Actions=amethyst, Items=steel, Locations=emerald).
            Actions: '#a855f7', Items: '#94a3b8', Locations: '#10b981',
            Monsters: '#fb923c', Traps: '#22c55e', Extra: '#22d3ee', Side: '#c084fc',
            Deck: '#818cf8', Sideboard: '#c084fc', Creatures: '#38bdf8',
            Spells: '#a855f7', Artifacts: '#94a3b8', Enchantments: '#f0abfc', Planeswalkers: '#fb923c', Lands: '#facc15'
        };

        function catRank(name) {
            const i = CATEGORY_ORDER.indexOf(name);
            return i === -1 ? 99 : i;
        }

        function updateDecklist() {
            const cats = currentDeck.categories || {};
            const entries = Object.entries(cats).filter(([, cards]) => cards && cards.length);
            entries.sort((a, b) => catRank(a[0]) - catRank(b[0]) || a[0].localeCompare(b[0]));

            // Header
            document.getElementById('deckTitle').textContent = currentDeck.title || 'Deck List';
            document.getElementById('deckGame').textContent =
                (currentDeck.game || 'TCG').charAt(0).toUpperCase() + (currentDeck.game || 'TCG').slice(1);

            let total = 0;
            entries.forEach(([, cards]) => cards.forEach(c => { total += (c.quantity || 1); }));
            document.getElementById('deckTotal').textContent = total;
            document.getElementById('deckCats').textContent =
                `${entries.length} ${entries.length === 1 ? 'type' : 'types'}`;

            // Body
            const body = document.getElementById('deckBody');
            if (!entries.length) {
                body.classList.remove('two-col');
                body.innerHTML = '<div class="deck-empty">No deck loaded</div>';
                return;
            }

            // Two columns when the list is long
            const rowCount = entries.reduce((n, [, cards]) => n + cards.length + 1, 0);
            body.classList.toggle('two-col', rowCount > 22);

            body.innerHTML = entries.map(([name, cards]) => {
                const accent = CATEGORY_ACCENT[name] || '#6366f1';
                const count = cards.reduce((s, c) => s + (c.quantity || 1), 0);
                const rows = cards.map(c => `
                    <div class="card-row">
                        <span class="card-qty">${c.quantity || 1}</span>
                        <span class="card-name">${escapeHtml(c.name || '')}</span>
                    </div>`).join('');
                return `
                    <div class="category" style="--accent:${accent}">
                        <div class="category-head">
                            <span class="category-accent"></span>
                            <span class="category-name">${escapeHtml(name)}</span>
                            <span class="category-count">${count}</span>
                        </div>
                        ${rows}
                    </div>`;
            }).join('');
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, m => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[m]));
        }

        function setShown(show) {
            document.getElementById('deckPanel').classList.toggle('active', !!show);
        }

        socket.on('decklist-update', (data) => {
            if (data && data.deck) currentDeck = data.deck;
            if (!currentDeck.categories) currentDeck.categories = {};
            updateDecklist();
            if (data) setShown(data.show);
        });

        socket.on('decklist-add-card', (data) => {
            const { category, card } = data || {};
            if (!category || !card) return;
            if (!currentDeck.categories) currentDeck.categories = {};
            if (!currentDeck.categories[category]) currentDeck.categories[category] = [];
            const existing = currentDeck.categories[category].find(c => c.name === card.name);
            if (existing) existing.quantity = (existing.quantity || 1) + 1;
            else currentDeck.categories[category].push({ name: card.name, quantity: 1 });
            updateDecklist();
        });

        socket.on('decklist-clear', () => {
            currentDeck.categories = {};
            updateDecklist();
            setShown(false);
        });

        socket.on('connect', () => {
            socket.emit('register-overlay', 'decklist');
            socket.emit('request-state', 'decklist');
        });

        updateDecklist();
    </script>
</body>
</html>
