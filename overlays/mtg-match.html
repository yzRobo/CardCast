<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>CardCast - MTG Match Overlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1920px;
            height: 1080px;
            background: transparent;
            font-family: 'Inter', 'Segoe UI', -apple-system, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Player boards - vertical glass panels on the sides */
        .player-board {
            position: absolute;
            top: 60px;
            width: 420px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 22px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(0,0,0,0.92) 0%, rgba(20,20,30,0.92) 100%);
            border: 3px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .player-board.left { left: 40px; border-top-color: #6366f1; }
        .player-board.right { right: 40px; border-top-color: #ef4444; }

        /* Active player highlight */
        .player-board.left.active {
            border-color: #6366f1;
            box-shadow: 0 0 36px rgba(99,102,241,0.55), 0 15px 40px rgba(0,0,0,0.7);
        }
        .player-board.right.active {
            border-color: #ef4444;
            box-shadow: 0 0 36px rgba(239,68,68,0.55), 0 15px 40px rgba(0,0,0,0.7);
        }

        /* Header */
        .board-header { border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 12px; }
        .name-row { display: flex; justify-content: space-between; align-items: center; }
        .player-name {
            font-size: 26px; font-weight: 800; color: #fff;
            text-transform: uppercase; letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 270px;
        }
        .player-record {
            font-size: 16px; font-weight: 700; color: #cbd5e1;
            background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 8px;
        }
        .games-won {
            margin-top: 8px; font-size: 14px; font-weight: 600; color: #94a3b8;
            text-transform: uppercase; letter-spacing: 0.6px;
        }

        /* Life headline */
        .life-block { text-align: center; padding: 6px 0; }
        .life-label {
            font-size: 14px; font-weight: 600; color: #94a3b8;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .life-total {
            font-size: 104px; font-weight: 800; line-height: 1.05;
            text-shadow: 0 4px 10px rgba(0,0,0,0.9);
            transition: color 0.3s ease;
        }
        .life-healthy { color: #34d399; }
        .life-warning { color: #fbbf24; }
        .life-critical { color: #f87171; animation: pulse 1s infinite; }

        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

        /* Poison counter (hidden at 0) */
        .poison-counter {
            display: none;
            margin-top: 4px;
            font-size: 16px; font-weight: 700; color: #a3e635;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .poison-counter.lethal { color: #f87171; animation: pulse 1s infinite; }

        /* Stat strip: Lands + Permanents */
        .stat-strip { display: flex; gap: 12px; }
        .stat {
            flex: 1; text-align: center;
            background: rgba(0,0,0,0.45); border-radius: 10px; padding: 10px 6px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .stat-label {
            display: block; font-size: 11px; color: #94a3b8;
            text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px;
        }
        .stat-value { display: block; font-size: 30px; font-weight: 800; color: #e2e8f0; }
        .left .stat-value { color: #818cf8; }
        .right .stat-value { color: #f87171; }

        /* Turn flags: Land played / Spell cast */
        .turn-flags { display: flex; gap: 12px; }
        .flag {
            flex: 1; text-align: center;
            background: rgba(0,0,0,0.45); border: 2px solid rgba(255,255,255,0.08);
            border-radius: 10px; padding: 10px;
            font-size: 13px; font-weight: 700; color: #64748b;
            text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .flag.active { border-color: #10b981; background: rgba(16,185,129,0.18); color: #34d399; }

        /* Featured permanents */
        .section-title {
            font-size: 13px; color: #94a3b8; text-transform: uppercase;
            letter-spacing: 1.2px; font-weight: 600; text-align: center;
        }
        .featured-row {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; min-height: 4px;
        }
        .perm-card {
            position: relative; border-radius: 8px; overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            animation: fadeIn 0.4s ease;
        }
        .perm-card img { width: 100%; display: block; aspect-ratio: 63/88; object-fit: cover; }
        .perm-name {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.88); color: #fff; padding: 3px 4px;
            font-size: 10px; font-weight: 600; text-align: center;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Shared bottom bar: format / timer / phase / whose turn */
        .match-bar {
            position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 22px;
            padding: 14px 32px; border-radius: 14px;
            background: linear-gradient(135deg, rgba(0,0,0,0.96) 0%, rgba(20,20,30,0.96) 100%);
            border: 2px solid #6366f1; backdrop-filter: blur(10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }
        .bar-sep { width: 1px; height: 34px; background: rgba(255,255,255,0.14); }
        .bar-format {
            font-size: 16px; font-weight: 700; color: #c7d2fe;
            text-transform: uppercase; letter-spacing: 1.4px;
        }
        .bar-timer {
            font-size: 34px; font-weight: 700; color: #00d4ff;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 14px rgba(0,212,255,0.5);
        }
        .bar-phase {
            font-size: 18px; font-weight: 700; color: #fff;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .bar-turn {
            padding: 8px 18px; border-radius: 22px;
            background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
            color: #fff; font-weight: 700; font-size: 14px;
            text-transform: uppercase; letter-spacing: 0.8px;
            box-shadow: 0 4px 12px rgba(99,102,241,0.4);
        }
        .bar-turn.p2 {
            background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
            box-shadow: 0 4px 12px rgba(239,68,68,0.4);
        }

        /* Connection status (debug, unobtrusive) */
        .connection-status {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 600;
            background: rgba(0,0,0,0.6); color: #34d399; opacity: 0.5;
        }
        .connection-status.disconnected { color: #f87171; }
    </style>
</head>
<body>
    <div id="connection-status" class="connection-status">Connected</div>

    <!-- Player 1 (left) -->
    <div id="p1-board" class="player-board left active">
        <div class="board-header">
            <div class="name-row">
                <span class="player-name" id="p1-name">Player 1</span>
                <span class="player-record" id="p1-record">0-0-0</span>
            </div>
            <div class="games-won">Games Won: <span id="p1-games">0</span></div>
        </div>
        <div class="life-block">
            <div class="life-label">Life</div>
            <div class="life-total life-healthy" id="p1-life">20</div>
            <div class="poison-counter" id="p1-poison">Poison <b id="p1-poison-val">0</b> / 10</div>
        </div>
        <div class="stat-strip">
            <div class="stat"><span class="stat-label">Lands</span><span class="stat-value" id="p1-lands">0</span></div>
            <div class="stat"><span class="stat-label">Permanents</span><span class="stat-value" id="p1-perm-count">0</span></div>
        </div>
        <div class="turn-flags">
            <div class="flag" id="p1-land-flag">Land</div>
            <div class="flag" id="p1-spell-flag">Spell</div>
        </div>
        <div class="section-title">Featured Permanents</div>
        <div class="featured-row" id="p1-featured"></div>
    </div>

    <!-- Player 2 (right) -->
    <div id="p2-board" class="player-board right">
        <div class="board-header">
            <div class="name-row">
                <span class="player-name" id="p2-name">Player 2</span>
                <span class="player-record" id="p2-record">0-0-0</span>
            </div>
            <div class="games-won">Games Won: <span id="p2-games">0</span></div>
        </div>
        <div class="life-block">
            <div class="life-label">Life</div>
            <div class="life-total life-healthy" id="p2-life">20</div>
            <div class="poison-counter" id="p2-poison">Poison <b id="p2-poison-val">0</b> / 10</div>
        </div>
        <div class="stat-strip">
            <div class="stat"><span class="stat-label">Lands</span><span class="stat-value" id="p2-lands">0</span></div>
            <div class="stat"><span class="stat-label">Permanents</span><span class="stat-value" id="p2-perm-count">0</span></div>
        </div>
        <div class="turn-flags">
            <div class="flag" id="p2-land-flag">Land</div>
            <div class="flag" id="p2-spell-flag">Spell</div>
        </div>
        <div class="section-title">Featured Permanents</div>
        <div class="featured-row" id="p2-featured"></div>
    </div>

    <!-- Shared bottom bar -->
    <div class="match-bar">
        <div class="bar-format" id="format-label">Standard</div>
        <div class="bar-sep"></div>
        <div class="bar-timer" id="timer-text">00:00</div>
        <div class="bar-sep"></div>
        <div class="bar-phase" id="phase-text">Main 1</div>
        <div class="bar-sep"></div>
        <div class="bar-turn" id="turn-text">Player 1's Turn</div>
    </div>

    <script>
        const FALLBACK_IMG = '/images/card-back.png';

        // Phase id -> display label
        const PHASE_NAMES = {
            untap: 'Untap', upkeep: 'Upkeep', draw: 'Draw',
            main1: 'Main 1', combat: 'Combat', main2: 'Main 2', end: 'End Step'
        };

        // Latest known state (kept so granular events can update derived UI like
        // the whose-turn label, which needs the current player names).
        let mtg = null;

        let socket;

        document.addEventListener('DOMContentLoaded', initSocket);

        function initSocket() {
            socket = io();

            socket.on('connect', () => {
                setConn(true);
                socket.emit('register-overlay', 'mtg-match');
                setTimeout(() => socket.emit('request-state', 'mtg-match'), 300);
            });
            socket.on('disconnect', () => setConn(false));

            // Full hydrate
            socket.on('state-update', (state) => {
                if (state && state.mtgMatch) {
                    mtg = state.mtgMatch;
                    renderAll(mtg);
                }
            });

            // Granular updates
            socket.on('mtg-life-update', (d) => {
                if (mtg) mtg[`player${d.player}`].life = d.life;
                renderLife(d.player, d.life);
            });
            socket.on('mtg-poison-update', (d) => {
                if (mtg) mtg[`player${d.player}`].poison = d.poison;
                renderPoison(d.player, d.poison);
            });
            socket.on('mtg-lands-update', (d) => {
                if (mtg) mtg[`player${d.player}`].lands = d.lands;
                setText(`p${d.player}-lands`, d.lands);
            });
            socket.on('mtg-permanent-added', (d) => {
                if (mtg) mtg[`player${d.player}`].featuredPermanents = d.featuredPermanents;
                renderFeatured(d.player, d.featuredPermanents);
            });
            socket.on('mtg-permanent-removed', (d) => {
                if (mtg) mtg[`player${d.player}`].featuredPermanents = d.featuredPermanents;
                renderFeatured(d.player, d.featuredPermanents);
            });
            socket.on('mtg-permanents-cleared', (d) => {
                if (mtg) mtg[`player${d.player}`].featuredPermanents = [];
                renderFeatured(d.player, []);
            });
            socket.on('mtg-phase-update', (d) => {
                if (mtg) mtg.currentPhase = d.phase;
                renderPhase(d.phase);
            });
            socket.on('mtg-player-name-update', (d) => {
                if (mtg) mtg[`player${d.player}`].name = d.name;
                setText(`p${d.player}-name`, d.name);
                if (mtg) renderTurn(mtg.activePlayer);
            });
            // Server emits 'mtg-record-update' (not 'mtg-player-record-update')
            socket.on('mtg-record-update', (d) => {
                if (mtg) mtg[`player${d.player}`].record = d.record;
                setText(`p${d.player}-record`, d.record);
            });
            socket.on('mtg-games-won-update', (d) => {
                if (mtg) mtg[`player${d.player}`].gamesWon = d.gamesWon;
                setText(`p${d.player}-games`, d.gamesWon);
            });
            socket.on('mtg-turn-actions-update', (d) => {
                if (mtg) mtg[`player${d.player}`].turnActions = d.actions;
                renderTurnFlags(d.player, d.actions);
            });
            socket.on('mtg-player-switch', (d) => {
                if (mtg) mtg.activePlayer = d.activePlayer;
                renderActive(d.activePlayer || 1);
            });
            socket.on('mtg-format-update', (d) => {
                if (mtg) mtg.matchFormat = d.format;
                renderFormat(d.format);
            });
            socket.on('mtg-timer-update', (d) => {
                if (mtg) mtg.timer = d.seconds;
                renderTimer(d.seconds);
            });
            socket.on('mtg-match-reset', () => location.reload());

            // Keep the control's overlay-status badge fresh
            setInterval(() => { if (socket.connected) socket.emit('register-overlay', 'mtg-match'); }, 5000);
        }

        function setConn(connected) {
            const el = document.getElementById('connection-status');
            el.textContent = connected ? 'Connected' : 'Disconnected';
            el.className = connected ? 'connection-status' : 'connection-status disconnected';
        }

        function setText(id, value) {
            const el = document.getElementById(id);
            if (el) el.textContent = value;
        }

        function renderAll(state) {
            [1, 2].forEach(p => {
                const player = state[`player${p}`];
                setText(`p${p}-name`, player.name);
                setText(`p${p}-record`, player.record);
                setText(`p${p}-games`, player.gamesWon);
                setText(`p${p}-lands`, player.lands);
                renderLife(p, player.life);
                renderPoison(p, player.poison || 0);
                renderFeatured(p, player.featuredPermanents);
                renderTurnFlags(p, player.turnActions);
            });
            renderFormat(state.matchFormat);
            renderPhase(state.currentPhase);
            renderTimer(state.timer || 0);
            renderActive(state.activePlayer || 1);
        }

        function renderLife(player, life) {
            const el = document.getElementById(`p${player}-life`);
            if (!el) return;
            el.textContent = life;
            let cls = 'life-healthy';
            if (life <= 5) cls = 'life-critical';
            else if (life <= 10) cls = 'life-warning';
            el.className = `life-total ${cls}`;
        }

        function renderPoison(player, poison) {
            const wrap = document.getElementById(`p${player}-poison`);
            const val = document.getElementById(`p${player}-poison-val`);
            if (!wrap || !val) return;
            val.textContent = poison;
            wrap.style.display = poison > 0 ? 'block' : 'none';
            wrap.classList.toggle('lethal', poison >= 10);
        }

        function renderFeatured(player, cards) {
            const el = document.getElementById(`p${player}-featured`);
            setText(`p${player}-perm-count`, cards ? cards.length : 0);
            if (!el) return;
            if (!cards || cards.length === 0) { el.innerHTML = ''; return; }
            el.innerHTML = cards.map(c => {
                const img = c.display_image || c.image_url || c.local_image || FALLBACK_IMG;
                return `<div class="perm-card">
                    <img src="${img}" alt="${c.name}" onerror="this.src='${FALLBACK_IMG}'">
                    <div class="perm-name">${c.name}</div>
                </div>`;
            }).join('');
        }

        function renderTurnFlags(player, actions) {
            actions = actions || {};
            const land = document.getElementById(`p${player}-land-flag`);
            const spell = document.getElementById(`p${player}-spell-flag`);
            if (land) land.classList.toggle('active', !!actions.landPlayed);
            if (spell) spell.classList.toggle('active', !!actions.spellCast);
        }

        function renderPhase(phase) {
            setText('phase-text', PHASE_NAMES[phase] || phase || 'Main 1');
        }

        function renderFormat(format) {
            setText('format-label', format || 'Standard');
        }

        function renderTimer(seconds) {
            seconds = Math.max(0, parseInt(seconds) || 0);
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            setText('timer-text', `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`);
        }

        function renderActive(activePlayer) {
            document.getElementById('p1-board').classList.toggle('active', activePlayer === 1);
            document.getElementById('p2-board').classList.toggle('active', activePlayer === 2);
            renderTurn(activePlayer);
        }

        function renderTurn(activePlayer) {
            const name = mtg ? mtg[`player${activePlayer}`].name : `Player ${activePlayer}`;
            const el = document.getElementById('turn-text');
            el.textContent = `${name}'s Turn`;
            el.classList.toggle('p2', activePlayer === 2);
        }
    </script>
</body>
</html>
